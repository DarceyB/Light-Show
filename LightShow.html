<script>
    $(document).ready(function() {
        $('#light1').click(function() {
        if(!$(this).hasClass('expanded')) { 
            $(this).addClass('expanded').animate ({
                width: '100%',
                height: '100%',
                top: '50%',
                left: '50%'         
            }, 500);
        $('#light2').hide();
        $('#light3').hide();
        $('#light4').hide();
        $('#light5').hide();
        $('#light6').hide();
        } else {
            $(this).removeClass('expanded').animate ({
                width: '400px',
                height: '200px',
                top: '14%',
                left: '50%'
            }, 500);
        $('#light2').show();
        $('#light3').show();    
        $('#light4').show();

        $('#light6').show();
        } 
        
    });
